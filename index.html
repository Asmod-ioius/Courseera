<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    /* ===== CSS Styling (5 pts) ===== */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    section {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 8px;
    }

    img {
      width: 150px;
      border-radius: 50%;
    }

    button {
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* ===== Responsive Design (2 pts) ===== */
    @media (max-width: 600px) {
      body {
        font-size: 14px;
      }

      img {
        width: 100px;
      }
    }
  </style>
</head>

<body>

  <!-- ===== HTML Structure (5 pts) ===== -->
  <header>
    <h1>My Portfolio</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- ===== Accessibility (3 pts) ===== -->
  <section id="about">
    <h2>About Me</h2>
    <img src="https://via.placeholder.com/150" alt="Profile picture of the student">
    <p>Hello! I am learning web development.</p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <ul>
      <li>Portfolio Website</li>
      <li>Calculator App</li>
      <li>Todo List</li>
    </ul>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <button onclick="showMessage()">Click Me</button>
  </section>

  <!-- ===== JavaScript Interactivity (5 pts) ===== -->
  <script>
    function showMessage() {
      alert("Thanks for visiting my portfolio!");
    }
  </script>

</body>
</html>
